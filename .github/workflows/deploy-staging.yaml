name: Deploy Staging

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            staging

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8 # v3
        with:
          version: 'latest'

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Update Kustomize image tag
        run: |
          cd k8s/overlays/staging
          kustomize edit set image ghcr.io/rampos/rampos:latest=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(git rev-parse HEAD)

      - name: Deploy to Staging
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          if [ -z "$KUBECONFIG" ]; then
            echo "KUBECONFIG_STAGING secret is not set. Skipping actual deployment."
            echo "Would run: kubectl apply -k k8s/overlays/staging"
          else
            echo "$KUBECONFIG" > kubeconfig.yaml
            export KUBECONFIG=kubeconfig.yaml
            kubectl apply -k k8s/overlays/staging
            kubectl rollout status deployment/rampos-server -n rampos --timeout=300s
          fi

      - name: Smoke Test
        run: |
          # Wait for DNS propagation/ingress update if needed, or hit IP directly if possible
          # This is a placeholder for actual smoke tests
          echo "Running smoke tests..."
          curl -f https://staging-api.rampos.io/health || echo "Health check failed (expected if DNS not set)"

      - name: Notify
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to staging succeeded!"
          else
            echo "❌ Deployment to staging failed!"
            exit 1
          fi
