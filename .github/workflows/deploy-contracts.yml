name: Deploy Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        type: choice
        options:
          - testnet
          - mainnet
      contract:
        description: "Contract to deploy"
        required: true
        type: choice
        options:
          - all
          - vndtoken
          - account-factory
          - paymaster

concurrency:
  group: deploy-contracts-${{ github.event.inputs.network }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.network }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network }}
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: forge install

      - name: Set RPC URL
        id: rpc
        run: |
          if [ "${{ github.event.inputs.network }}" = "testnet" ]; then
            echo "rpc_url=${{ secrets.TESTNET_RPC_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "rpc_url=${{ secrets.MAINNET_RPC_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set deploy script
        id: script
        run: |
          case "${{ github.event.inputs.contract }}" in
            all)
              echo "script=script/DeployAll.s.sol" >> "$GITHUB_OUTPUT"
              echo "contract=DeployAllScript" >> "$GITHUB_OUTPUT"
              ;;
            vndtoken)
              echo "script=script/DeployAll.s.sol" >> "$GITHUB_OUTPUT"
              echo "contract=DeployVNDOnly" >> "$GITHUB_OUTPUT"
              ;;
            account-factory)
              echo "script=script/Deploy.s.sol" >> "$GITHUB_OUTPUT"
              echo "contract=DeployScript" >> "$GITHUB_OUTPUT"
              ;;
            paymaster)
              echo "script=script/Deploy.s.sol" >> "$GITHUB_OUTPUT"
              echo "contract=DeployScript" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Deploy contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          forge script ${{ steps.script.outputs.script }}:${{ steps.script.outputs.contract }} \
            --rpc-url ${{ steps.rpc.outputs.rpc_url }} \
            --broadcast \
            --verify \
            -vvv

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: deployment-${{ github.event.inputs.network }}-${{ github.event.inputs.contract }}-${{ github.run_number }}
          path: contracts/broadcast/
          retention-days: 90
