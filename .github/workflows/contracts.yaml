name: Smart Contracts

on:
  push:
    branches: [main, master]
    paths:
      - 'contracts/**'
  pull_request:
    paths:
      - 'contracts/**'

env:
  FOUNDRY_PROFILE: default

jobs:
  check:
    name: Foundry Project
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: nightly
          cache: true

      - name: Build
        run: forge build --sizes

      - name: Run Tests
        run: forge test -vvv

      - name: Run Gas Report
        run: forge test --gas-report

      - name: Run Coverage
        run: forge coverage

  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: nightly

      - name: Run Fuzz Tests
        run: forge test --match-path "test/fuzz/**/*.sol"

  invariants:
    name: Invariant Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: nightly

      - name: Run Invariant Tests
        run: forge test --match-path "test/invariants/**/*.sol"

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Run Slither
        uses: crytic/slither-action@f197989dea5b53e986d0f88c60a034ddd77ec9a8 # v0.4.0
        continue-on-error: true
        with:
          target: 'contracts'
          slither-args: '--checklist --markdown-root contracts'

