name: SDK Generation & Drift Detection

on:
  push:
    branches: [main, master]
    paths:
      - "crates/ramp-api/src/openapi.rs"
      - "crates/ramp-api/src/dto/**"
      - "crates/ramp-api/src/handlers/**"
      - "sdk-python/**"
      - "sdk-go/**"
      - "sdk/**"
      - "docs/cli/**"
      - "docs/SDK.md"
      - "README.md"
      - "README.vi.md"
      - "docs/api/README.md"
      - "scripts/build-cli-manifest.py"
      - "scripts/rampos-cli.py"
      - "scripts/test-rampos-cli.sh"
      - "examples/typescript-integration/**"
      - "examples/go-integration/**"
      - "scripts/validate-openapi.sh"
      - ".github/workflows/sdk-generate.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "crates/ramp-api/src/openapi.rs"
      - "crates/ramp-api/src/dto/**"
      - "crates/ramp-api/src/handlers/**"
      - "sdk-python/**"
      - "sdk-go/**"
      - "sdk/**"
      - "docs/cli/**"
      - "docs/SDK.md"
      - "README.md"
      - "README.vi.md"
      - "docs/api/README.md"
      - "scripts/build-cli-manifest.py"
      - "scripts/rampos-cli.py"
      - "scripts/test-rampos-cli.sh"
      - "examples/typescript-integration/**"
      - "examples/go-integration/**"
      - "scripts/validate-openapi.sh"
      - ".github/workflows/sdk-generate.yml"
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Force SDK regeneration even if spec unchanged"
        required: false
        default: "false"
        type: boolean

jobs:
  detect-drift:
    name: Detect OpenAPI Spec Changes
    runs-on: ubuntu-latest
    outputs:
      spec_changed: ${{ steps.check.outputs.changed }}
      generated_changed: ${{ steps.check.outputs.generated_changed }}
      spec_hash: ${{ steps.check.outputs.hash }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Check spec changes
        id: check
        run: |
          HASH=$(
            git ls-files \
              crates/ramp-api/src/openapi.rs \
              'crates/ramp-api/src/dto/**' \
              'crates/ramp-api/src/handlers/**' \
              'sdk-python/src/rampos/cli/**' \
              docs/cli/coverage-ledger.md \
              docs/cli/README.md \
              docs/cli/agent-usage.md \
              scripts/build-cli-manifest.py \
              scripts/test-rampos-cli.sh \
              scripts/validate-openapi.sh \
              .github/workflows/sdk-generate.yml \
              .github/workflows/sdk-ci.yml \
            | sort \
            | while read -r file; do
                [ -f "$file" ] && sha256sum "$file"
              done \
            | sha256sum | cut -d' ' -f1
          )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "openapi.rs\|dto/\|handlers/\|sdk-python/src/rampos/cli/\|docs/cli/\|build-cli-manifest.py\|test-rampos-cli.sh\|validate-openapi.sh\|sdk-generate.yml\|sdk-ci.yml"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Contract-facing surface or related files changed"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No contract-facing surface changes detected"
          fi

          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "^sdk-python/\|^sdk-go/\|^sdk/\|^docs/SDK.md\|^docs/cli/\|^README.md\|^README.vi.md\|^docs/api/README.md\|^scripts/build-cli-manifest.py\|^scripts/rampos-cli.py\|^scripts/test-rampos-cli.sh\|^examples/typescript-integration/\|^examples/go-integration/"; then
            echo "generated_changed=true" >> "$GITHUB_OUTPUT"
            echo "Generated SDK / CLI surfaces changed"
          else
            echo "generated_changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated SDK / CLI surface changes detected"
          fi

  test-python:
    name: Python SDK (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: detect-drift
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk-python/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint check
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        run: pytest -v --tb=short

      - name: Verify SDK imports
        run: |
          python -c "
          from rampos import RampOSClient, RampOSConfig
          from rampos.models.intent import CreatePayinRequest
          from rampos.services.intent import IntentService
          print('All SDK imports verified successfully')
          "

  test-go:
    name: Go SDK (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    needs: detect-drift
    strategy:
      fail-fast: true
      matrix:
        go-version: ["1.21", "1.22"]
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: sdk-go/go.sum

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Build check
        run: go build ./...

      - name: Vet check
        run: go vet ./...

  contract-surface:
    name: Contract Surface Validation
    runs-on: ubuntu-latest
    needs: detect-drift
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk-python/pyproject.toml

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"
          cache-dependency-path: sdk-go/go.sum

      - name: Run contract validation script
        run: bash scripts/validate-openapi.sh

  drift-gate:
    name: SDK Drift Gate
    runs-on: ubuntu-latest
    needs: [detect-drift, test-python, test-go, contract-surface]
    if: always()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check test results
        run: |
          echo "=== SDK Drift Gate Summary ==="
          echo "Spec changed: ${{ needs.detect-drift.outputs.spec_changed }}"
          echo "Generated surface changed: ${{ needs.detect-drift.outputs.generated_changed }}"
          echo "Spec hash: ${{ needs.detect-drift.outputs.spec_hash }}"

      - name: Verify all SDK tests passed
        if: needs.test-python.result != 'success' || needs.test-go.result != 'success' || needs.contract-surface.result != 'success'
        run: |
          echo "ERROR: SDK tests failed!"
          echo "Python SDK: ${{ needs.test-python.result }}"
          echo "Go SDK: ${{ needs.test-go.result }}"
          echo "Contract Surface: ${{ needs.contract-surface.result }}"
          exit 1

      - name: Require generated artifacts when contract surface changes
        if: needs.detect-drift.outputs.spec_changed == 'true' && needs.detect-drift.outputs.generated_changed != 'true'
        run: |
          echo "ERROR: OpenAPI contract surface changed without regenerated SDK / CLI artifacts."
          echo ""
          echo "Regenerate and commit the affected generated surfaces before merging:"
          echo "  1. Run: bash scripts/validate-openapi.sh"
          echo "  2. Run: bash scripts/test-rampos-cli.sh"
          echo "  3. Commit updated SDK/docs/examples artifacts"
          exit 1

      - name: Gate passed
        run: echo "All SDK drift checks passed successfully."

      - name: Run thin CLI smoke
        run: bash scripts/test-rampos-cli.sh
