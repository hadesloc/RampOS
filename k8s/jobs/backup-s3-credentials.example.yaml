# Backup S3 Credentials Secret Template
# RampOS Backup and Disaster Recovery
#
# IMPORTANT: This is a TEMPLATE file - DO NOT deploy directly!
# Replace placeholder values with actual credentials.
#
# Supported providers:
# - AWS S3
# - Google Cloud Storage (with S3-compatible API)
# - MinIO
# - DigitalOcean Spaces
# - Backblaze B2
# - Any S3-compatible storage
#
# Recommended: Use SealedSecrets or External Secrets Operator
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-s3-credentials
  namespace: rampos
  annotations:
    template/warning: "DO NOT DEPLOY - This is an example template only"
type: Opaque
stringData:
  # S3 Endpoint URL
  # AWS S3: https://s3.amazonaws.com (or regional: https://s3.us-east-1.amazonaws.com)
  # MinIO: http://minio.minio.svc.cluster.local:9000
  # DigitalOcean: https://nyc3.digitaloceanspaces.com
  # Backblaze: https://s3.us-west-000.backblazeb2.com
  ENDPOINT: "${BACKUP_S3_ENDPOINT}"

  # S3 Bucket name for backups
  BUCKET: "${BACKUP_S3_BUCKET}"

  # AWS-compatible access credentials
  ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"

  # Optional: Region (for AWS)
  # AWS_REGION: "us-east-1"
