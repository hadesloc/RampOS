apiVersion: batch/v1
kind: Job
metadata:
  name: rampos-migration
  namespace: rampos
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    metadata:
      labels:
        app: rampos-migration
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: migration
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        image: ghcr.io/rampos/rampos:0.1.0
        command: ["/app/rampos-server", "migrate"]
        envFrom:
        - configMapRef:
            name: rampos-config
        - secretRef:
            name: rampos-secret
      restartPolicy: OnFailure
