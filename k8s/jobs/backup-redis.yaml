# Redis Backup CronJob
# RampOS Backup and Disaster Recovery Infrastructure
#
# Strategy:
# - Daily RDB snapshot (point-in-time snapshot)
# - AOF (Append-Only File) for continuous persistence
# - Backups stored in S3-compatible object storage
# - Retention: 7 daily, 4 weekly backups
#
# RPO: ~1 second (with AOF fsync=everysec)
# RTO: 10 minutes (restore from RDB + AOF replay)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-backup-scripts
  namespace: rampos
data:
  backup-redis.sh: |
    #!/bin/bash
    set -euo pipefail

    # Configuration
    BACKUP_DATE=$(date +%Y%m%d_%H%M%S)
    BACKUP_NAME="rampos_redis_${BACKUP_DATE}"
    BACKUP_DIR="/backup"
    S3_BUCKET="${BACKUP_S3_BUCKET:-rampos-backups}"
    S3_PREFIX="${BACKUP_S3_PREFIX:-redis}"
    RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-14}"

    echo "[$(date -Iseconds)] Starting Redis backup..."

    # Create backup directory
    mkdir -p "${BACKUP_DIR}"

    # Trigger BGSAVE on Redis
    echo "[$(date -Iseconds)] Triggering Redis BGSAVE..."
    redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning BGSAVE

    # Wait for background save to complete
    echo "[$(date -Iseconds)] Waiting for BGSAVE to complete..."
    while true; do
      LASTSAVE_BEFORE=$(redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning LASTSAVE)
      sleep 2
      LASTSAVE_AFTER=$(redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning LASTSAVE)

      # Check if BGSAVE is in progress
      BGSAVE_STATUS=$(redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning INFO persistence | grep rdb_bgsave_in_progress | cut -d: -f2 | tr -d '\r')

      if [ "${BGSAVE_STATUS}" = "0" ]; then
        echo "[$(date -Iseconds)] BGSAVE completed"
        break
      fi

      echo "[$(date -Iseconds)] BGSAVE in progress, waiting..."
      sleep 5
    done

    # Get Redis info for metadata
    REDIS_INFO=$(redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning INFO)
    REDIS_VERSION=$(echo "${REDIS_INFO}" | grep redis_version | cut -d: -f2 | tr -d '\r')
    USED_MEMORY=$(echo "${REDIS_INFO}" | grep used_memory_human | cut -d: -f2 | tr -d '\r')
    KEYS_COUNT=$(redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning DBSIZE | awk '{print $2}')

    echo "[$(date -Iseconds)] Redis version: ${REDIS_VERSION}"
    echo "[$(date -Iseconds)] Memory used: ${USED_MEMORY}"
    echo "[$(date -Iseconds)] Keys count: ${KEYS_COUNT}"

    # Copy RDB file from Redis pod data volume
    # Note: This requires shared volume or network copy
    echo "[$(date -Iseconds)] Creating RDB backup..."

    # Use redis-cli to dump all keys (for small datasets)
    # For production, consider mounting the Redis data volume
    redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning --rdb "${BACKUP_DIR}/${BACKUP_NAME}.rdb" 2>/dev/null || {
      echo "[$(date -Iseconds)] Direct RDB copy not available, using DUMP method..."
      # Alternative: Dump critical keys pattern
      for pattern in "session:*" "rate_limit:*" "cache:*"; do
        redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning --scan --pattern "${pattern}" | \
          while read key; do
            redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning DUMP "$key" | \
              xxd -p > "${BACKUP_DIR}/keys/${key}.dump" 2>/dev/null || true
          done
      done
    }

    # Calculate checksum if RDB exists
    BACKUP_CHECKSUM=""
    BACKUP_SIZE=0
    if [ -f "${BACKUP_DIR}/${BACKUP_NAME}.rdb" ]; then
      BACKUP_SIZE=$(stat -c%s "${BACKUP_DIR}/${BACKUP_NAME}.rdb")
      BACKUP_CHECKSUM=$(sha256sum "${BACKUP_DIR}/${BACKUP_NAME}.rdb" | cut -d' ' -f1)
    fi

    # Upload to S3 (if configured)
    if [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${BACKUP_S3_ENDPOINT:-}" ]; then
      echo "[$(date -Iseconds)] Uploading to S3..."

      if [ -f "${BACKUP_DIR}/${BACKUP_NAME}.rdb" ]; then
        aws --endpoint-url "${BACKUP_S3_ENDPOINT}" s3 cp \
          "${BACKUP_DIR}/${BACKUP_NAME}.rdb" \
          "s3://${S3_BUCKET}/${S3_PREFIX}/${BACKUP_NAME}.rdb"
      fi

      # Create metadata file
      cat > "${BACKUP_DIR}/${BACKUP_NAME}.meta.json" <<EOF
    {
      "backup_name": "${BACKUP_NAME}",
      "backup_type": "rdb_snapshot",
      "timestamp": "$(date -Iseconds)",
      "size_bytes": ${BACKUP_SIZE},
      "sha256": "${BACKUP_CHECKSUM}",
      "redis_version": "${REDIS_VERSION}",
      "used_memory": "${USED_MEMORY}",
      "keys_count": "${KEYS_COUNT}",
      "retention_days": ${RETENTION_DAYS}
    }
    EOF

      aws --endpoint-url "${BACKUP_S3_ENDPOINT}" s3 cp \
        "${BACKUP_DIR}/${BACKUP_NAME}.meta.json" \
        "s3://${S3_BUCKET}/${S3_PREFIX}/${BACKUP_NAME}.meta.json"

      echo "[$(date -Iseconds)] Upload complete"

      # Cleanup old backups
      echo "[$(date -Iseconds)] Cleaning up old backups (retention: ${RETENTION_DAYS} days)..."
      CUTOFF_DATE=$(date -d "-${RETENTION_DAYS} days" +%Y%m%d)

      aws --endpoint-url "${BACKUP_S3_ENDPOINT}" s3 ls \
        "s3://${S3_BUCKET}/${S3_PREFIX}/" | \
        awk '{print $4}' | \
        grep -E '^rampos_redis_[0-9]{8}' | \
        while read -r file; do
          FILE_DATE=$(echo "$file" | grep -oE '[0-9]{8}')
          if [ "$FILE_DATE" -lt "$CUTOFF_DATE" ]; then
            echo "[$(date -Iseconds)] Deleting old backup: $file"
            aws --endpoint-url "${BACKUP_S3_ENDPOINT}" s3 rm \
              "s3://${S3_BUCKET}/${S3_PREFIX}/$file"
          fi
        done
    fi

    # Cleanup local files
    rm -f "${BACKUP_DIR}/${BACKUP_NAME}.rdb"
    rm -f "${BACKUP_DIR}/${BACKUP_NAME}.meta.json"
    rm -rf "${BACKUP_DIR}/keys"

    echo "[$(date -Iseconds)] Redis backup completed successfully"

  restore-redis.sh: |
    #!/bin/bash
    set -euo pipefail

    # Usage: restore-redis.sh <backup-name|latest>
    BACKUP_NAME="${1:-latest}"
    S3_BUCKET="${BACKUP_S3_BUCKET:-rampos-backups}"
    S3_PREFIX="${BACKUP_S3_PREFIX:-redis}"

    echo "[$(date -Iseconds)] Starting Redis restore..."
    echo "[$(date -Iseconds)] Backup: ${BACKUP_NAME}"

    mkdir -p /backup

    # Find latest backup if needed
    if [ "${BACKUP_NAME}" = "latest" ]; then
      echo "[$(date -Iseconds)] Finding latest backup..."
      BACKUP_NAME=$(aws --endpoint-url "${BACKUP_S3_ENDPOINT}" s3 ls \
        "s3://${S3_BUCKET}/${S3_PREFIX}/" | \
        awk '{print $4}' | \
        grep -E '\.rdb$' | \
        sort -r | \
        head -n1 | \
        sed 's/\.rdb$//')
    fi

    if [ -z "${BACKUP_NAME}" ]; then
      echo "[$(date -Iseconds)] ERROR: No backup found!"
      exit 1
    fi

    # Download backup
    echo "[$(date -Iseconds)] Downloading: ${BACKUP_NAME}.rdb"
    aws --endpoint-url "${BACKUP_S3_ENDPOINT}" s3 cp \
      "s3://${S3_BUCKET}/${S3_PREFIX}/${BACKUP_NAME}.rdb" \
      "/backup/${BACKUP_NAME}.rdb"

    # Verify checksum
    echo "[$(date -Iseconds)] Verifying backup integrity..."
    aws --endpoint-url "${BACKUP_S3_ENDPOINT}" s3 cp \
      "s3://${S3_BUCKET}/${S3_PREFIX}/${BACKUP_NAME}.meta.json" \
      "/backup/${BACKUP_NAME}.meta.json" || true

    if [ -f "/backup/${BACKUP_NAME}.meta.json" ]; then
      EXPECTED_CHECKSUM=$(jq -r '.sha256' "/backup/${BACKUP_NAME}.meta.json")
      ACTUAL_CHECKSUM=$(sha256sum "/backup/${BACKUP_NAME}.rdb" | cut -d' ' -f1)

      if [ "${EXPECTED_CHECKSUM}" != "${ACTUAL_CHECKSUM}" ]; then
        echo "[$(date -Iseconds)] ERROR: Checksum mismatch!"
        exit 1
      fi
      echo "[$(date -Iseconds)] Checksum verified"
    fi

    # Stop Redis AOF
    echo "[$(date -Iseconds)] Disabling AOF temporarily..."
    redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning CONFIG SET appendonly no

    # Flush all data
    echo "[$(date -Iseconds)] WARNING: Flushing all Redis data..."
    redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning FLUSHALL

    # Note: For full restore, the RDB file needs to be copied to Redis data directory
    # and Redis needs to be restarted. This script provides the framework.
    echo "[$(date -Iseconds)] RDB file downloaded to: /backup/${BACKUP_NAME}.rdb"
    echo "[$(date -Iseconds)] To complete restore:"
    echo "  1. Stop Redis: kubectl scale statefulset rampos-redis --replicas=0"
    echo "  2. Copy RDB to data volume: kubectl cp /backup/${BACKUP_NAME}.rdb rampos-redis-0:/data/dump.rdb"
    echo "  3. Start Redis: kubectl scale statefulset rampos-redis --replicas=1"

    echo "[$(date -Iseconds)] Redis restore preparation completed"
---
# Daily Redis backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup-daily
  namespace: rampos
  labels:
    app: rampos-backup
    component: redis
spec:
  schedule: "30 2 * * *"  # Daily at 2:30 AM UTC (after Postgres backup)
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800  # 30 minute timeout
      template:
        metadata:
          labels:
            app: rampos-backup
            component: redis
        spec:
          serviceAccountName: rampos-backup
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: redis:7-alpine
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: false
            command: ["/bin/sh", "-c"]
            args:
            - |
              apk add --no-cache bash aws-cli jq coreutils
              /scripts/backup-redis.sh
            env:
            - name: REDIS_HOST
              value: "rampos-redis"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rampos-secret
                  key: REDIS_PASSWORD
            # S3 Configuration
            - name: BACKUP_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: ENDPOINT
                  optional: true
            - name: BACKUP_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: BUCKET
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: SECRET_ACCESS_KEY
                  optional: true
            - name: BACKUP_RETENTION_DAYS
              value: "14"
            volumeMounts:
            - name: backup-scripts
              mountPath: /scripts
            - name: backup-storage
              mountPath: /backup
            resources:
              requests:
                memory: "128Mi"
                cpu: "50m"
              limits:
                memory: "512Mi"
                cpu: "200m"
          volumes:
          - name: backup-scripts
            configMap:
              name: redis-backup-scripts
              defaultMode: 0755
          - name: backup-storage
            emptyDir:
              sizeLimit: 2Gi
