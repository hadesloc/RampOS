apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rampos-alerts
  namespace: monitoring
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
  - name: rampos.rules
    rules:
    # API Alerts
    - alert: APIHighLatency
      expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High API Latency (p99 > 500ms)"
        description: "API p99 latency is {{ $value }}s for more than 5 minutes."

    - alert: APIHighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100 > 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High API Error Rate (> 1%)"
        description: "API 5xx error rate is {{ $value }}% for more than 5 minutes."

    # Intent Alerts
    - alert: IntentFailureSpike
      expr: sum(rate(ramp_intent_failed_total[5m])) > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Spike in Failed Intents"
        description: "Intent failure rate is {{ $value }} per second."

    # Infrastructure Alerts
    - alert: HighPodRestarts
      expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frequent Pod Restarts"
        description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in 15 minutes."

    - alert: PVCUsageHigh
      expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "PVC Disk Usage High"
        description: "PVC {{ $labels.persistentvolumeclaim }} is at {{ $value }}% usage."

  # Backup and Disaster Recovery Alerts
  - name: rampos.backup.rules
    rules:
    - alert: BackupJobFailed
      expr: kube_job_status_failed{namespace="rampos",job_name=~".*backup.*"} > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Backup job failed"
        description: "Backup job {{ $labels.job_name }} has failed. Check job logs immediately."
        runbook_url: "https://docs.rampos.io/runbooks/backup-job-failed"

    - alert: BackupJobMissing
      expr: time() - kube_cronjob_status_last_successful_time{namespace="rampos",cronjob=~".*backup.*"} > 172800
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "Backup job hasn't run successfully in 2 days"
        description: "CronJob {{ $labels.cronjob }} hasn't completed successfully since {{ $value | humanizeDuration }} ago."
        runbook_url: "https://docs.rampos.io/runbooks/backup-missing"

    - alert: PostgresBackupTooOld
      expr: time() - kube_cronjob_status_last_successful_time{namespace="rampos",cronjob="postgres-backup-daily"} > 90000
      for: 30m
      labels:
        severity: critical
      annotations:
        summary: "PostgreSQL backup is more than 25 hours old"
        description: "Last successful PostgreSQL backup was {{ $value | humanizeDuration }} ago. RPO may be at risk."
        runbook_url: "https://docs.rampos.io/runbooks/postgres-backup-old"

    - alert: BackupStorageNearCapacity
      expr: rampos_backup_storage_used_bytes / rampos_backup_storage_capacity_bytes * 100 > 80
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "Backup storage nearing capacity"
        description: "Backup storage is at {{ $value }}% capacity. Consider increasing retention cleanup or storage."

    - alert: BackupVerificationFailed
      expr: kube_job_status_failed{namespace="rampos",job_name=~"postgres-backup-verify.*"} > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backup verification failed"
        description: "Weekly backup verification job failed. Backup integrity may be compromised."
        runbook_url: "https://docs.rampos.io/runbooks/backup-verification-failed"
