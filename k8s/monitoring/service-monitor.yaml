apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rampos-api-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: ramp-api
  namespaceSelector:
    matchNames:
      - ramp-os
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rampos-core-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: ramp-core
  namespaceSelector:
    matchNames:
      - ramp-os
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
