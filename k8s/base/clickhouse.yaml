# =============================================================================
# ClickHouse Analytics Pipeline (G7)
# Single-node StatefulSet for dev/staging. See comments for production scaling.
# Provides analytics tables for intent events, API metrics, and OTel data.
# =============================================================================

# --- ClickHouse Configuration ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: rampos
  labels:
    app: clickhouse
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: rampos
data:
  # Server configuration
  config.xml: |
    <clickhouse>
      <logger>
        <level>information</level>
        <console>true</console>
      </logger>

      <http_port>8123</http_port>
      <tcp_port>9000</tcp_port>
      <interserver_http_port>9009</interserver_http_port>

      <max_connections>100</max_connections>
      <keep_alive_timeout>3</keep_alive_timeout>
      <max_concurrent_queries>50</max_concurrent_queries>

      <path>/var/lib/clickhouse/</path>
      <tmp_path>/var/lib/clickhouse/tmp/</tmp_path>
      <user_files_path>/var/lib/clickhouse/user_files/</user_files_path>

      <mark_cache_size>5368709120</mark_cache_size>

      <!-- Production: uncomment for cluster mode
      <remote_servers>
        <rampos_cluster>
          <shard>
            <replica>
              <host>clickhouse-0.clickhouse-headless</host>
              <port>9000</port>
            </replica>
            <replica>
              <host>clickhouse-1.clickhouse-headless</host>
              <port>9000</port>
            </replica>
          </shard>
        </rampos_cluster>
      </remote_servers>
      -->

      <builtin_dictionaries_reload_interval>3600</builtin_dictionaries_reload_interval>
      <max_session_timeout>3600</max_session_timeout>
      <default_session_timeout>60</default_session_timeout>
    </clickhouse>

  # User configuration
  users.xml: |
    <clickhouse>
      <users>
        <default>
          <password_sha256_hex></password_sha256_hex>
          <networks>
            <ip>::/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
          <access_management>1</access_management>
        </default>
        <rampos>
          <!-- Production: use password from Secret, not inline -->
          <password_sha256_hex></password_sha256_hex>
          <networks>
            <ip>::/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
          <access_management>0</access_management>
        </rampos>
      </users>
      <profiles>
        <default>
          <max_memory_usage>2000000000</max_memory_usage>
          <max_execution_time>60</max_execution_time>
          <load_balancing>random</load_balancing>
        </default>
      </profiles>
      <quotas>
        <default>
          <interval>
            <duration>3600</duration>
            <queries>1000</queries>
            <errors>100</errors>
            <result_rows>1000000</result_rows>
            <read_rows>10000000</read_rows>
            <execution_time>600</execution_time>
          </interval>
        </default>
      </quotas>
    </clickhouse>

---
# --- Analytics Schema Init ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init-schema
  namespace: rampos
  labels:
    app: clickhouse
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
data:
  init-schema.sql: |
    -- =============================================
    -- RampOS Analytics Schema (G7)
    -- =============================================

    CREATE DATABASE IF NOT EXISTS rampos_analytics;

    -- Intent Events: tracks lifecycle of payment intents
    CREATE TABLE IF NOT EXISTS rampos_analytics.intent_events
    (
        timestamp         DateTime64(3, 'UTC'),
        event_id          UUID DEFAULT generateUUIDv4(),
        intent_id         String,
        status            LowCardinality(String),
        previous_status   LowCardinality(String),
        amount            Decimal64(8),
        currency          LowCardinality(String),
        user_id           String,
        partner_id        String,
        direction         LowCardinality(String),  -- 'payin' or 'payout'
        payment_method    LowCardinality(String),
        chain             LowCardinality(String),
        error_code        LowCardinality(Nullable(String)),
        error_message     Nullable(String),
        processing_time_ms  UInt32 DEFAULT 0,
        metadata          String DEFAULT '{}'
    )
    ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (timestamp, intent_id)
    TTL toDateTime(timestamp) + INTERVAL 90 DAY
    SETTINGS index_granularity = 8192;

    -- API Request Metrics: tracks all API endpoint performance
    CREATE TABLE IF NOT EXISTS rampos_analytics.api_request_metrics
    (
        timestamp         DateTime64(3, 'UTC'),
        request_id        UUID DEFAULT generateUUIDv4(),
        endpoint          LowCardinality(String),
        method            LowCardinality(String),
        status_code       UInt16,
        latency_ms        Float32,
        user_id           Nullable(String),
        partner_id        Nullable(String),
        request_size      UInt32 DEFAULT 0,
        response_size     UInt32 DEFAULT 0,
        user_agent        Nullable(String),
        ip_address        Nullable(String),
        error_type        LowCardinality(Nullable(String))
    )
    ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (timestamp, endpoint, status_code)
    TTL toDateTime(timestamp) + INTERVAL 90 DAY
    SETTINGS index_granularity = 8192;

    -- Compliance Events: KYC/KYT/AML audit trail
    CREATE TABLE IF NOT EXISTS rampos_analytics.compliance_events
    (
        timestamp         DateTime64(3, 'UTC'),
        event_id          UUID DEFAULT generateUUIDv4(),
        event_type        LowCardinality(String),  -- 'kyc_check', 'kyt_screen', 'ctr_filed'
        user_id           String,
        result            LowCardinality(String),  -- 'pass', 'fail', 'review'
        provider          LowCardinality(String),
        risk_score        Nullable(Float32),
        details           String DEFAULT '{}'
    )
    ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (timestamp, event_type, user_id)
    TTL toDateTime(timestamp) + INTERVAL 365 DAY  -- 1 year for compliance
    SETTINGS index_granularity = 8192;

    -- Chain Events: on-chain transaction tracking
    CREATE TABLE IF NOT EXISTS rampos_analytics.chain_events
    (
        timestamp         DateTime64(3, 'UTC'),
        event_id          UUID DEFAULT generateUUIDv4(),
        chain             LowCardinality(String),
        tx_hash           String,
        block_number      UInt64,
        from_address      String,
        to_address        String,
        value_wei         UInt256,
        gas_used          UInt64,
        gas_price_gwei    Float64,
        status            LowCardinality(String),  -- 'confirmed', 'failed', 'pending'
        intent_id         Nullable(String)
    )
    ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (timestamp, chain, tx_hash)
    TTL toDateTime(timestamp) + INTERVAL 180 DAY
    SETTINGS index_granularity = 8192;

    -- Materialized view: Intent funnel summary (hourly)
    CREATE MATERIALIZED VIEW IF NOT EXISTS rampos_analytics.intent_funnel_hourly
    ENGINE = SummingMergeTree()
    PARTITION BY toYYYYMM(hour)
    ORDER BY (hour, direction, status, currency)
    AS SELECT
        toStartOfHour(timestamp) AS hour,
        direction,
        status,
        currency,
        count() AS event_count,
        sum(amount) AS total_amount,
        avg(processing_time_ms) AS avg_processing_ms
    FROM rampos_analytics.intent_events
    GROUP BY hour, direction, status, currency;

    -- Materialized view: API latency percentiles (hourly)
    CREATE MATERIALIZED VIEW IF NOT EXISTS rampos_analytics.api_latency_hourly
    ENGINE = AggregatingMergeTree()
    PARTITION BY toYYYYMM(hour)
    ORDER BY (hour, endpoint, method)
    AS SELECT
        toStartOfHour(timestamp) AS hour,
        endpoint,
        method,
        count() AS request_count,
        quantileState(0.5)(latency_ms) AS p50_latency,
        quantileState(0.95)(latency_ms) AS p95_latency,
        quantileState(0.99)(latency_ms) AS p99_latency,
        countIf(status_code >= 500) AS error_5xx_count,
        countIf(status_code >= 400 AND status_code < 500) AS error_4xx_count
    FROM rampos_analytics.api_request_metrics
    GROUP BY hour, endpoint, method;

---
# --- ServiceAccount ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clickhouse
  namespace: rampos
  labels:
    app: clickhouse
    app.kubernetes.io/name: clickhouse

---
# --- Headless Service for StatefulSet DNS ---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-headless
  namespace: rampos
  labels:
    app: clickhouse
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8123
      targetPort: http
      protocol: TCP
    - name: tcp
      port: 9000
      targetPort: tcp
      protocol: TCP
    - name: interserver
      port: 9009
      targetPort: interserver
      protocol: TCP
  selector:
    app: clickhouse

---
# --- Client-facing Service ---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: rampos
  labels:
    app: clickhouse
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8123
      targetPort: http
      protocol: TCP
    - name: tcp
      port: 9000
      targetPort: tcp
      protocol: TCP
  selector:
    app: clickhouse

---
# --- ClickHouse StatefulSet ---
# Single node for dev/staging.
# Production scaling: increase replicas, uncomment remote_servers in config,
# use ReplicatedMergeTree engine, and add ZooKeeper/ClickHouse Keeper.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: rampos
  labels:
    app: clickhouse
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: rampos
spec:
  serviceName: clickhouse-headless
  replicas: 1  # Production: increase to 2+ with ReplicatedMergeTree
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/component: analytics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8123"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: clickhouse
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      initContainers:
        # Run schema init on startup
        - name: init-schema
          image: clickhouse/clickhouse-server:24.1-alpine
          command: ['sh', '-c']
          args:
            - |
              # Wait for ClickHouse to be ready (started by main container)
              # This init container just copies the schema file
              cp /init/init-schema.sql /docker-entrypoint-initdb.d/init-schema.sql
          volumeMounts:
            - name: init-scripts
              mountPath: /init
              readOnly: true
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.1-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: tcp
              containerPort: 9000
              protocol: TCP
            - name: interserver
              containerPort: 9009
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/custom-config.xml
              subPath: config.xml
              readOnly: true
            - name: users-config
              mountPath: /etc/clickhouse-server/users.d/custom-users.xml
              subPath: users.xml
              readOnly: true
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: clickhouse-config
            items:
              - key: config.xml
                path: config.xml
        - name: users-config
          configMap:
            name: clickhouse-config
            items:
              - key: users.xml
                path: users.xml
        - name: init-scripts
          configMap:
            name: clickhouse-init-schema
        - name: initdb
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi

---
# --- NetworkPolicy for ClickHouse ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clickhouse-policy
  namespace: rampos
  labels:
    app: clickhouse
spec:
  podSelector:
    matchLabels:
      app: clickhouse
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from OTel Collector (analytics pipeline)
  - from:
    - podSelector:
        matchLabels:
          app: otel-collector
    ports:
    - protocol: TCP
      port: 9000
    - protocol: TCP
      port: 8123
  # Allow traffic from application server (direct queries)
  - from:
    - podSelector:
        matchLabels:
          app: rampos-server
    ports:
    - protocol: TCP
      port: 8123
  # Allow metrics scraping
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 8123
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: coredns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
