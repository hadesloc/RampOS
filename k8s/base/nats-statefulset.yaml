apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rampos-nats
  namespace: rampos
spec:
  serviceName: rampos-nats
  replicas: 3
  selector:
    matchLabels:
      app: rampos-nats
  template:
    metadata:
      labels:
        app: rampos-nats
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nats
        image: nats:2.10-alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        args:
        - "-c"
        - "/etc/nats/nats.conf"
        ports:
        - containerPort: 4222
          name: client
        - containerPort: 8222
          name: monitor
        - containerPort: 6222
          name: cluster
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NATS_USER
          valueFrom:
            secretKeyRef:
              name: rampos-secret
              key: NATS_USER
        - name: NATS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rampos-secret
              key: NATS_PASSWORD
        volumeMounts:
        - name: nats-data
          mountPath: /data
        - name: nats-config
          mountPath: /etc/nats
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: nats-config
        configMap:
          name: rampos-nats-config
  volumeClaimTemplates:
  - metadata:
      name: nats-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rampos-nats
  namespace: rampos
spec:
  ports:
  - port: 4222
    name: client
  - port: 8222
    name: monitor
  - port: 6222
    name: cluster
  clusterIP: None
  selector:
    app: rampos-nats
