# PgBouncer Secrets - ExternalSecrets / SealedSecrets Template
# DO NOT put real secret values in this file
# This file defines the secret structure; actual values come from your secret manager
#
# Option 1: Use ExternalSecrets Operator (recommended for cloud)
# Option 2: Use SealedSecrets (recommended for on-prem)
# Option 3: Create secrets manually with kubectl:
#   kubectl create secret generic pgbouncer-secret \
#     --namespace=rampos \
#     --from-literal=ADMIN_PASSWORD="$(openssl rand -base64 24)" \
#     --from-literal=STATS_PASSWORD="$(openssl rand -base64 24)"
#
# Option 4: Use ExternalSecrets Operator (uncomment below):
# ---
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: pgbouncer-secret
#   namespace: rampos
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: vault-backend  # or aws-secrets-manager, gcp-secret-manager
#     kind: ClusterSecretStore
#   target:
#     name: pgbouncer-secret
#     creationPolicy: Owner
#   data:
#   - secretKey: ADMIN_PASSWORD
#     remoteRef:
#       key: rampos/pgbouncer
#       property: admin-password
#   - secretKey: STATS_PASSWORD
#     remoteRef:
#       key: rampos/pgbouncer
#       property: stats-password
---
# SealedSecret template - encrypt with kubeseal before committing:
#   kubeseal --format yaml < pgbouncer-secrets.dec.yaml > pgbouncer-secrets.yaml
#
# To generate the plaintext secret for sealing, create pgbouncer-secrets.dec.yaml:
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: pgbouncer-secret
#     namespace: rampos
#   type: Opaque
#   stringData:
#     ADMIN_PASSWORD: "<generated-with-openssl-rand-base64-24>"
#     STATS_PASSWORD: "<generated-with-openssl-rand-base64-24>"
#
# For now, this is a placeholder Secret that must be replaced before deployment.
# The cluster will NOT start correctly with these placeholder values.
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-secret
  namespace: rampos
  labels:
    app: pgbouncer
    component: connection-pooler
  annotations:
    description: "PgBouncer admin credentials - MUST be replaced with real values before deployment"
    secret-generator/warning: "This contains PLACEHOLDER values only"
type: Opaque
stringData:
  # PLACEHOLDER - Generate real values with: openssl rand -base64 24
  # Replace this entire file with a SealedSecret or ExternalSecret in production
  ADMIN_PASSWORD: "REPLACE_ME_WITH_REAL_SECRET"
  STATS_PASSWORD: "REPLACE_ME_WITH_REAL_SECRET"
