# PostgreSQL Secrets - ExternalSecrets / SealedSecrets Template
# DO NOT put real secret values in this file
# This file defines the secret structure; actual values come from your secret manager
#
# Option 1: Use ExternalSecrets Operator (recommended for cloud)
# Option 2: Use SealedSecrets (recommended for on-prem)
# Option 3: Create secrets manually with kubectl:
#   kubectl create secret generic rampos-postgres-secret \
#     --namespace=rampos \
#     --from-literal=REPLICATION_PASSWORD="$(openssl rand -base64 32)"
#
# Option 4: Use ExternalSecrets Operator (uncomment below):
# ---
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: rampos-postgres-secret
#   namespace: rampos
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: vault-backend  # or aws-secrets-manager, gcp-secret-manager
#     kind: ClusterSecretStore
#   target:
#     name: rampos-postgres-secret
#     creationPolicy: Owner
#   data:
#   - secretKey: REPLICATION_PASSWORD
#     remoteRef:
#       key: rampos/postgres
#       property: replication-password
---
# SealedSecret template - encrypt with kubeseal before committing:
#   kubeseal --format yaml < postgres-secrets.dec.yaml > postgres-secrets.yaml
#
# To generate the plaintext secret for sealing, create postgres-secrets.dec.yaml:
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: rampos-postgres-secret
#     namespace: rampos
#   type: Opaque
#   stringData:
#     REPLICATION_PASSWORD: "<generated-with-openssl-rand-base64-32>"
#
# Then seal it:
#   kubeseal --controller-name=sealed-secrets \
#     --controller-namespace=kube-system \
#     --format yaml < postgres-secrets.dec.yaml > postgres-secrets.yaml
#
# For now, this is a placeholder Secret that must be replaced before deployment.
# The cluster will NOT start correctly with these placeholder values.
apiVersion: v1
kind: Secret
metadata:
  name: rampos-postgres-secret
  namespace: rampos
  labels:
    app: rampos-postgres
    component: database
  annotations:
    description: "PostgreSQL replication credentials - MUST be replaced with real values before deployment"
    secret-generator/warning: "This contains PLACEHOLDER values only"
type: Opaque
stringData:
  # PLACEHOLDER - Generate real value with: openssl rand -base64 32
  # Replace this entire file with a SealedSecret or ExternalSecret in production
  REPLICATION_PASSWORD: "REPLACE_ME_WITH_REAL_SECRET"
