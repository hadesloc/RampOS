apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rampos-ingress
  namespace: rampos
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.rampos.io
    secretName: rampos-tls
  rules:
  - host: api.rampos.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rampos-server
            port:
              number: 80
