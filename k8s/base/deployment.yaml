apiVersion: apps/v1
kind: Deployment
metadata:
  name: rampos-server
  namespace: rampos
  labels:
    app: rampos-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rampos-server
  template:
    metadata:
      labels:
        app: rampos-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: rampos-server
        image: ghcr.io/rampos/rampos:0.1.0
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: rampos-config
        - secretRef:
            name: rampos-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
