apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rampos-redis
  namespace: rampos
spec:
  serviceName: rampos-redis
  replicas: 1
  selector:
    matchLabels:
      app: rampos-redis
  template:
    metadata:
      labels:
        app: rampos-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["sh", "-c", "redis-server --appendonly yes --requirepass $REDIS_PASSWORD"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rampos-secret
              key: REDIS_PASSWORD
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "200m"
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rampos-redis
  namespace: rampos
spec:
  ports:
  - port: 6379
  clusterIP: None
  selector:
    app: rampos-redis
