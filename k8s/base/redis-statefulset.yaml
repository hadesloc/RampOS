apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rampos-redis
  namespace: rampos
spec:
  serviceName: rampos-redis
  replicas: 3
  selector:
    matchLabels:
      app: rampos-redis
  template:
    metadata:
      labels:
        app: rampos-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["/bin/sh", "/scripts/init-redis.sh"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rampos-secret
              key: REDIS_PASSWORD
        ports:
        - containerPort: 6379
          name: client
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: scripts
          mountPath: /scripts
        - name: config
          mountPath: /config
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD save"]
      volumes:
      - name: scripts
        configMap:
          name: redis-scripts
          items:
          - key: init-redis.sh
            path: init-redis.sh
            mode: 0755
      - name: config
        configMap:
          name: redis-scripts
          items:
          - key: redis.conf
            path: redis.conf
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rampos-redis-sentinel
  namespace: rampos
spec:
  serviceName: rampos-redis-sentinel
  replicas: 3
  selector:
    matchLabels:
      app: rampos-redis-sentinel
  template:
    metadata:
      labels:
        app: rampos-redis-sentinel
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: sentinel
        image: redis:7-alpine
        command: ["/bin/sh", "/scripts/init-sentinel.sh"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rampos-secret
              key: REDIS_PASSWORD
        ports:
        - containerPort: 26379
          name: sentinel
        volumeMounts:
        - name: sentinel-data
          mountPath: /data
        - name: scripts
          mountPath: /scripts
        - name: config
          mountPath: /config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
      volumes:
      - name: scripts
        configMap:
          name: redis-scripts
          items:
          - key: init-sentinel.sh
            path: init-sentinel.sh
            mode: 0755
      - name: config
        configMap:
          name: redis-scripts
          items:
          - key: sentinel.conf
            path: sentinel.conf
  volumeClaimTemplates:
  - metadata:
      name: sentinel-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 100Mi
