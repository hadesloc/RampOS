apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rampos-hpa
  namespace: rampos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rampos-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
