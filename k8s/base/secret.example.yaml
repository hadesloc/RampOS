apiVersion: v1
kind: Secret
metadata:
  name: rampos-secret
  namespace: rampos
  annotations:
    # This is a TEMPLATE file - DO NOT deploy directly
    # Generate real secrets using one of these methods:
    # 1. openssl rand -base64 32
    # 2. Use SealedSecrets: kubeseal --format yaml < secret.yaml > sealed-secret.yaml
    # 3. Use External Secrets Operator with your cloud provider
    template/warning: "DO NOT DEPLOY - This is an example template only"
type: Opaque
stringData:
  # =============================================================================
  # IMPORTANT: Replace ALL values below before deployment
  # Generate strong secrets: openssl rand -base64 32
  # =============================================================================

  # JWT Secret - Used for signing authentication tokens
  # Generate: openssl rand -base64 64
  JWT_SECRET: "${JWT_SECRET}"

  # Database password - PostgreSQL authentication
  # Generate: openssl rand -base64 32
  DATABASE_PASSWORD: "${DATABASE_PASSWORD}"

  # Redis password - Cache authentication
  # Generate: openssl rand -base64 32
  REDIS_PASSWORD: "${REDIS_PASSWORD}"

  # NATS credentials - Message queue authentication
  NATS_USER: "${NATS_USER}"
  NATS_PASSWORD: "${NATS_PASSWORD}"

  # Connection strings - Will be templated from above values
  RAMPOS__DATABASE__URL: "postgres://rampos:${DATABASE_PASSWORD}@rampos-postgres:5432/rampos"
  RAMPOS__REDIS__URL: "redis://:${REDIS_PASSWORD}@rampos-redis:6379"
  RAMPOS__NATS__URL: "nats://${NATS_USER}:${NATS_PASSWORD}@rampos-nats:4222"

  # Admin API key - Used for admin dashboard authentication
  # Generate: openssl rand -hex 24
  RAMPOS_ADMIN_KEY: "${RAMPOS_ADMIN_KEY}"

  # Encryption key - Used for encrypting sensitive data at rest
  # Generate: openssl rand -base64 32
  RAMPOS_ENCRYPTION_KEY: "${RAMPOS_ENCRYPTION_KEY}"
