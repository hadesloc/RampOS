apiVersion: v1
kind: Secret
metadata:
  name: rampos-secret
  namespace: rampos
type: Opaque
stringData:
  # DO NOT COMMIT REAL SECRETS
  # Use SealedSecrets or External Secrets Operator in production
  JWT_SECRET: "placeholder-secret"
  DATABASE_PASSWORD: "placeholder-password"
  REDIS_PASSWORD: "placeholder-password"
  NATS_USER: "change-me"
  NATS_PASSWORD: "change-me"
  RAMPOS__DATABASE__URL: "postgres://rampos:${DATABASE_PASSWORD}@rampos-postgres:5432/rampos"
  RAMPOS__REDIS__URL: "redis://:${REDIS_PASSWORD}@rampos-redis:6379"
  RAMPOS__NATS__URL: "nats://$(NATS_USER):$(NATS_PASSWORD)@rampos-nats:4222"
  RAMPOS_ADMIN_KEY: "change-me"
  RAMPOS_ENCRYPTION_KEY: "change-me"
