apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rampos

resources:
- ../../base
- pdb.yaml

# Image configuration - updated by CI/CD
images:
- name: ghcr.io/rampos/rampos
  newTag: latest

# Production-specific patches
patches:
- target:
    kind: Deployment
    name: rampos-server
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "1000m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "1Gi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: "250m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: "256Mi"
    - op: add
      path: /spec/strategy
      value:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
- target:
    kind: StatefulSet
    name: rampos-postgres
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
- target:
    kind: StatefulSet
    name: rampos-redis
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
- target:
    kind: StatefulSet
    name: rampos-nats
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
- target:
    kind: Ingress
    name: rampos-ingress
  patch: |-
    - op: replace
      path: /spec/tls/0/hosts/0
      value: api.rampos.io
    - op: replace
      path: /spec/rules/0/host
      value: api.rampos.io

# Production-specific config
configMapGenerator:
- name: rampos-config
  behavior: merge
  literals:
  - RUST_LOG=warn
  - ENVIRONMENT=production
  - ENABLE_DEBUG_ENDPOINTS=false
  - CORS_ALLOWED_ORIGINS=https://rampos.io,https://app.rampos.io

# Labels for all resources
commonLabels:
  app.kubernetes.io/environment: production
  app.kubernetes.io/managed-by: kustomize

# Production requires PodDisruptionBudget
# This will be added as a separate resource
