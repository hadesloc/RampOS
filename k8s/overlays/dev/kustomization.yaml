apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
- target:
    kind: Deployment
    name: rampos-server
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
- target:
    kind: StatefulSet
    name: rampos-postgres
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
- target:
    kind: StatefulSet
    name: rampos-redis
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
- target:
    kind: StatefulSet
    name: rampos-nats
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
- target:
    kind: Ingress
    name: rampos-ingress
  patch: |-
    - op: replace
      path: /spec/tls/0/hosts/0
      value: dev-api.rampos.io
    - op: replace
      path: /spec/rules/0/host
      value: dev-api.rampos.io
