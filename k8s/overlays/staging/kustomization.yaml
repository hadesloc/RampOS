apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rampos-staging

resources:
- ../../base

# Image configuration - updated by CI/CD
images:
- name: ghcr.io/rampos/rampos
  newTag: latest

# Staging-specific patches
patches:
- target:
    kind: Deployment
    name: rampos-server
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "500m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "512Mi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: "100m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: "128Mi"
- target:
    kind: StatefulSet
    name: rampos-postgres
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
- target:
    kind: StatefulSet
    name: rampos-redis
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
- target:
    kind: StatefulSet
    name: rampos-nats
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
- target:
    kind: Ingress
    name: rampos-ingress
  patch: |-
    - op: replace
      path: /spec/tls/0/hosts/0
      value: staging-api.rampos.io
    - op: replace
      path: /spec/rules/0/host
      value: staging-api.rampos.io

# Staging-specific config
configMapGenerator:
- name: rampos-config
  behavior: merge
  literals:
  - RUST_LOG=info
  - ENVIRONMENT=staging
  - ENABLE_DEBUG_ENDPOINTS=false
  - CORS_ALLOWED_ORIGINS=https://staging.rampos.io

# Labels for all resources
commonLabels:
  app.kubernetes.io/environment: staging
  app.kubernetes.io/managed-by: kustomize
