version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rampos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rampos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-rampos}
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Migrations are run by the app, not docker init
      # - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rampos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rampos-redis
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_redis_pass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS JetStream
  nats:
    image: nats:2.10-alpine
    container_name: rampos-nats
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    command: --jetstream --store_dir /data
    volumes:
      - nats_data:/data

  # ClickHouse Analytics
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: rampos-clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # RampOS API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rampos-api
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    environment:
      RAMPOS__DATABASE__URL: postgres://${POSTGRES_USER:-rampos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rampos}
      RAMPOS__REDIS__URL: redis://:${REDIS_PASSWORD}@redis:6379
      RAMPOS__NATS__URL: nats://nats:4222
      RAMPOS__SERVER__HOST: 0.0.0.0
      RAMPOS__SERVER__PORT: 8080
      RAMPOS_ADMIN_KEY: ${RAMPOS_ADMIN_KEY:?RAMPOS_ADMIN_KEY must be set}
      RUST_LOG: info,ramp_api=debug,ramp_core=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Admin Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rampos-frontend
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Frontend Landing Page
  frontend-landing:
    build:
      context: ./frontend-landing
      dockerfile: Dockerfile
    container_name: rampos-landing
    ports:
      - "127.0.0.1:3002:3000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_DASHBOARD_URL: http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  nats_data:
  clickhouse_data:
