<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RampOS Widget - Smoke Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .status { padding: 8px 16px; border-radius: 4px; margin: 8px 0; font-family: monospace; }
    .pass { background: #d1fae5; color: #065f46; }
    .fail { background: #fee2e2; color: #991b1b; }
    #widget-container { border: 2px dashed #d1d5db; padding: 20px; margin: 20px 0; min-height: 100px; }
    #results { margin-top: 20px; }
    h1 { color: #1f2937; }
    h2 { color: #374151; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>RampOS Widget SDK - Smoke Test</h1>
  <p>This page tests the IIFE embed build by loading <code>dist/rampos-embed.iife.js</code>.</p>

  <h2>Widget Container</h2>
  <div id="widget-container"></div>

  <h2>Test Results</h2>
  <div id="results"></div>

  <!-- Load the IIFE build -->
  <script src="../dist/rampos-embed.iife.js"></script>

  <script>
    const results = document.getElementById('results');

    function report(name, passed, detail) {
      const div = document.createElement('div');
      div.className = 'status ' + (passed ? 'pass' : 'fail');
      div.textContent = (passed ? 'PASS' : 'FAIL') + ': ' + name + (detail ? ' - ' + detail : '');
      results.appendChild(div);
    }

    // Test 1: window.RampOSWidget exists
    try {
      const exists = typeof window.RampOSWidget !== 'undefined';
      report('window.RampOSWidget exists', exists);
    } catch (e) {
      report('window.RampOSWidget exists', false, e.message);
    }

    // Test 2: RampOSWidget has init method
    try {
      const hasInit = typeof window.RampOSWidget.init === 'function';
      report('RampOSWidget.init is a function', hasInit);
    } catch (e) {
      report('RampOSWidget.init is a function', false, e.message);
    }

    // Test 3: RampOSWidget has destroy method
    try {
      const hasDestroy = typeof window.RampOSWidget.destroy === 'function';
      report('RampOSWidget.destroy is a function', hasDestroy);
    } catch (e) {
      report('RampOSWidget.destroy is a function', false, e.message);
    }

    // Test 4: RampOSWidget has version
    try {
      const hasVersion = typeof window.RampOSWidget.version === 'string' && window.RampOSWidget.version.length > 0;
      report('RampOSWidget.version is defined', hasVersion, window.RampOSWidget.version);
    } catch (e) {
      report('RampOSWidget.version is defined', false, e.message);
    }

    // Test 5: Can initialize widget
    try {
      const instance = window.RampOSWidget.init({
        apiKey: 'smoke-test-key',
        container: '#widget-container',
        type: 'checkout',
        environment: 'sandbox',
      });
      const created = instance && instance.id && instance.container instanceof HTMLElement;
      report('Widget init creates instance', created, 'id=' + instance.id);
    } catch (e) {
      report('Widget init creates instance', false, e.message);
    }

    // Test 6: Widget renders DOM
    try {
      const widgetRoot = document.querySelector('.rampos-widget-root');
      report('Widget renders DOM elements', widgetRoot !== null);
    } catch (e) {
      report('Widget renders DOM elements', false, e.message);
    }

    // Test 7: Can destroy widget
    try {
      window.RampOSWidget.destroyAll();
      const afterDestroy = document.querySelector('.rampos-widget-root');
      report('Widget destroyAll cleans up DOM', afterDestroy === null);
    } catch (e) {
      report('Widget destroyAll cleans up DOM', false, e.message);
    }
  </script>
</body>
</html>
