apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rampos
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rampos/rampos.git
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: rampos
  syncPolicy:
    automated:
      prune: false  # Change to false for production
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
